<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" shape-rendering="crispEdges" width="256" height="256">
  <!-- 16x16 pixel grid, each pixel = 16 units -->
  <!-- Row 1 (y=16): mic top cap -->
  <rect x="80" y="16" width="96" height="16" fill="#0d0d0d"/>
  <!-- Row 2 (y=32) -->
  <rect x="64" y="32" width="16" height="16" fill="#0d0d0d"/>
  <rect x="80" y="32" width="96" height="16" fill="#b8b8b8"/>
  <rect x="176" y="32" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 3 (y=48) -->
  <rect x="48" y="48" width="16" height="16" fill="#0d0d0d"/>
  <rect x="64" y="48" width="128" height="16" fill="#b8b8b8"/>
  <rect x="192" y="48" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 4 (y=64): grill line -->
  <rect x="48" y="64" width="16" height="16" fill="#0d0d0d"/>
  <rect x="64" y="64" width="16" height="16" fill="#b8b8b8"/>
  <rect x="80" y="64" width="96" height="16" fill="#0d0d0d"/>
  <rect x="176" y="64" width="16" height="16" fill="#b8b8b8"/>
  <rect x="192" y="64" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 5 (y=80) -->
  <rect x="48" y="80" width="16" height="16" fill="#0d0d0d"/>
  <rect x="64" y="80" width="128" height="16" fill="#b8b8b8"/>
  <rect x="192" y="80" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 6 (y=96): grill line -->
  <rect x="48" y="96" width="16" height="16" fill="#0d0d0d"/>
  <rect x="64" y="96" width="16" height="16" fill="#b8b8b8"/>
  <rect x="80" y="96" width="96" height="16" fill="#0d0d0d"/>
  <rect x="176" y="96" width="16" height="16" fill="#b8b8b8"/>
  <rect x="192" y="96" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 7 (y=112) -->
  <rect x="48" y="112" width="16" height="16" fill="#0d0d0d"/>
  <rect x="64" y="112" width="128" height="16" fill="#b8b8b8"/>
  <rect x="192" y="112" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 8 (y=128): grill line -->
  <rect x="48" y="128" width="16" height="16" fill="#0d0d0d"/>
  <rect x="64" y="128" width="16" height="16" fill="#b8b8b8"/>
  <rect x="80" y="128" width="96" height="16" fill="#0d0d0d"/>
  <rect x="176" y="128" width="16" height="16" fill="#b8b8b8"/>
  <rect x="192" y="128" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 9 (y=144) -->
  <rect x="48" y="144" width="16" height="16" fill="#0d0d0d"/>
  <rect x="64" y="144" width="128" height="16" fill="#b8b8b8"/>
  <rect x="192" y="144" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 10 (y=160) -->
  <rect x="64" y="160" width="16" height="16" fill="#0d0d0d"/>
  <rect x="80" y="160" width="96" height="16" fill="#b8b8b8"/>
  <rect x="176" y="160" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 11 (y=176): mic bottom cap -->
  <rect x="80" y="176" width="96" height="16" fill="#0d0d0d"/>
  <!-- Rows 12-13 (y=192,208): yoke wire tops -->
  <rect x="32" y="192" width="16" height="16" fill="#0d0d0d"/>
  <rect x="208" y="192" width="16" height="16" fill="#0d0d0d"/>
  <rect x="32" y="208" width="16" height="16" fill="#0d0d0d"/>
  <rect x="208" y="208" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 14 (y=224): yoke wire bends -->
  <rect x="48" y="224" width="16" height="16" fill="#0d0d0d"/>
  <rect x="192" y="224" width="16" height="16" fill="#0d0d0d"/>
  <!-- Row 15 (y=240): yoke bar -->
  <rect x="64" y="240" width="128" height="16" fill="#0d0d0d"/>
